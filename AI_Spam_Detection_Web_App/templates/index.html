<!DOCTYPE html>
<html>
<head>
    <title>AI Email Spam Detector</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            padding:50px;
        }

        .container{
            background:white;
            width:60%;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        textarea{
            width:80%;
            height:150px;
            padding:10px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:12px 25px;
            margin-top:15px;
            cursor:pointer;
            border-radius:5px;
        }

        h1{
            color:#333;
        }

        h2{
            color:green;
        }
    </style>
</head>

<body>

<div class="container">

<h1>AI Email Spam Detection System</h1>

<form action="/predict" method="post">

<textarea
name="email"
placeholder="Enter Email Here"></textarea>

<br>

<button type="submit">
Predict
</button>

</form>

<h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
